<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1152d4",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Presentation Quote Slide</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-3 w-full shrink-0">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">brand_awareness</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Presentation Mode</h2>
</div>
<div class="flex items-center gap-4">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Slide 12 of 24</span>
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-lg h-10 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-3 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">grid_view</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-3 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-[20px]">more_horiz</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 bg-primary text-white px-6 font-bold text-sm tracking-wide hover:opacity-90 transition-opacity">
                    SHARE
                </button>
</div>
</div>
</header>
<!-- Main Presentation Area (16:9 Aspect Ratio Container) -->
<main class="flex-1 flex items-center justify-center p-8 lg:p-12 overflow-hidden">
<!-- The Slide Canvas -->
<div class="relative w-full max-w-6xl aspect-video bg-primary rounded-xl shadow-2xl overflow-hidden flex flex-col items-center justify-center p-12 lg:p-24 text-center">
<!-- Background Texture/Pattern Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none" data-alt="Subtle white dot pattern on blue background" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 40px 40px;">
</div>
<!-- Top Branding Accent -->
<div class="absolute top-12 left-1/2 -translate-x-1/2">
<div class="w-12 h-1 bg-white/40 rounded-full"></div>
</div>
<!-- Content Area -->
<div class="relative z-10 flex flex-col items-center gap-8">
<span class="material-symbols-outlined text-white/40 text-6xl lg:text-8xl">format_quote</span>
<h1 class="text-white text-4xl md:text-5xl lg:text-7xl font-extrabold leading-[1.1] tracking-tight max-w-5xl uppercase italic">
                    "The best way to predict the future is to create it."
                </h1>
<div class="flex flex-col items-center gap-2">
<div class="h-px w-24 bg-white/60 mb-4"></div>
<h2 class="text-white/90 text-xl md:text-2xl font-semibold tracking-wide">— Peter Drucker</h2>
<p class="text-white/60 text-sm font-medium tracking-[0.2em] uppercase">Key Insight • Strategy 2024</p>
</div>
</div>
<!-- Bottom Branding Accent -->
<div class="absolute bottom-12 right-12 flex items-center gap-2">
<span class="text-white/30 text-xs font-bold tracking-widest uppercase">Global Vision Corp</span>
<span class="material-symbols-outlined text-white/30 text-xl">blur_on</span>
</div>
</div>
</main>
<!-- Presentation Controls -->
<footer class="w-full max-w-[960px] mx-auto pb-8 px-4">
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between px-6 py-3">
<div class="flex items-center gap-4">
<button class="p-2 text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-sm font-bold text-slate-900 dark:text-slate-100 px-4 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg">
                    12 / 24
                </div>
<button class="p-2 text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
<button class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">present_to_all</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-2"></div>
<button class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">fullscreen</span>
</button>
</div>
</div>
</footer>
</body></html>
